<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Filiado | UNEGRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #050505; --gray: #121212; --border: rgba(255,255,255,0.1); }
        
        /* RESET E ESTRUTURA BASE */
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--black); color: #fff; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

        /* HEADER RESPONSIVO */
        header { background: #000; border-bottom: 1px solid var(--border); padding: 10px 0; position: sticky; top: 0; z-index: 1000; }
        .header-content { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo-area img { height: 40px; }
        .user-tag { font-size: 10px; font-weight: bold; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* GRID PRINCIPAL RESPONSIVO */
        .main-wrapper { 
            max-width: 1280px; 
            margin: 40px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: 1fr 380px; 
            gap: 40px; 
            flex: 1; 
        }

        h2 { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 1.1rem; border-left: 4px solid var(--red); padding-left: 15px; margin: 30px 0 20px 0; color: var(--gold); }

        /* DESTAQUE */
        .news-card { background: var(--gray); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 30px; }
        .news-img { width: 100%; height: 400px; background: #000; object-fit: cover; }
        .news-body { padding: 30px; }
        .news-tag { color: var(--red); font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .news-body h3 { margin: 15px 0; font-size: 2rem; line-height: 1.1; color: #fff; }
        .news-body p { color: #aaa; line-height: 1.6; font-size: 14px; margin-bottom: 20px; }

        /* VÍDEOS RESPONSIVOS */
        .video-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .video-item { background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; aspect-ratio: 16/9; }
        .video-item:hover { border-color: var(--gold); transform: translateY(-5px); }
        .video-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .video-item::after { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-size: 30px; }
        .video-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 8px; font-size: 10px; text-align: center; font-weight: bold; color: #fff; }

        /* CALENDÁRIO */
        .cal-container { background: var(--gray); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border-radius: 50%; transition: 0.2s; color: #666; }
        .has-event { border: 1px solid var(--gold); color: var(--gold) !important; font-weight: 900; }
        .cal-day.active { background: var(--gold) !important; color: #000 !important; font-weight: 900; }

        #event-detail { margin-top: 20px; padding: 20px; background: #0a0a0a; border-radius: 12px; border: 1px solid var(--gold); display: none; }
        .btn-sync { padding: 10px; border-radius: 6px; text-decoration: none; font-size: 10px; font-weight: 900; text-align: center; flex: 1; display: inline-block; text-transform: uppercase; }

        /* BIBLIOTECA */
        .lib-box { background: var(--gray); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-top: 30px; }
        .search-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .lib-item { padding: 12px; border-bottom: 1px solid #222; color: #aaa; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* MODAL */
        #pdf-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); display: none; z-index: 9999; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { max-width: 1100px; height: 92vh; margin: 0 auto; background: #1a1a1a; border-radius: 12px; border: 1px solid var(--gold); display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 15px 25px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .btn-close { background: var(--red); color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 10px; }

        /* LOGIN */
        #lock-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-card { background: var(--gray); padding: 50px; border-radius: 16px; border: 1px solid var(--gold); text-align: center; width: 340px; }

        /* RODAPÉ */
        footer { background: #000; border-top: 1px solid var(--border); padding: 20px; text-align: center; font-size: 11px; color: #666; }
        footer a { color: var(--gold); text-decoration: none; font-weight: bold; }

        /* --- MEDIA QUERIES PARA RESPONSIVIDADE --- */

        @media (max-width: 1024px) {
            .main-wrapper { 
                grid-template-columns: 1fr; /* Empilha as colunas em tablets e celulares */
                margin: 20px auto;
            }
            .right-col { order: 2; } /* Garante que a agenda fique abaixo das notícias */
            .news-img { height: 300px; } /* Imagem menor para telas menores */
        }

        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 10px; text-align: center; }
            .news-body { padding: 20px; }
            .news-body h3 { font-size: 1.5rem; }
            .login-card { width: 90%; padding: 30px 20px; }
            .video-row { grid-template-columns: 1fr; } /* Vídeos em coluna única no celular */
            .modal-content { height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-card">
            <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" style="height: 50px; margin-bottom: 30px;">
            <h2 style="font-family: 'Oswald'; letter-spacing: 2px;">ACESSO FILIADO</h2>
            <input type="text" id="user-name" placeholder="Nome Completo" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff; border-radius:6px;">
            <input type="email" id="user-email" placeholder="E-mail" style="width:100%; padding:12px; margin-bottom:20px; background:#000; border:1px solid #333; color:#fff; border-radius:6px;">
            <button onclick="validarAcesso()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:900; border-radius:6px; cursor:pointer; text-transform:uppercase;">Entrar</button>
        </div>
    </div>

    <div id="pdf-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0; font-size:12px; color:var(--gold); text-transform:uppercase;">Visualizador</h3>
                <button class="btn-close" onclick="fecharModal()">FECHAR</button>
            </div>
            <iframe id="pdf-viewer" style="width:100%; height:100%; border:none;" src=""></iframe>
        </div>
    </div>

    <header>
        <div class="header-content">
            <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" style="height:35px;">
            <div class="user-tag" id="user-info"></div>
        </div>
    </header>

    <div class="main-wrapper" id="main-content" style="display: none;">
        <div class="left-col">
            <div id="destaque-area"></div>
            <h2>Nossas Lideranças</h2>
            <div class="video-row" id="grid-liderancas"></div>
            <h2>UNEGRO Nacional</h2>
            <div class="video-row" id="grid-nacional"></div>
        </div>

        <div class="right-col">
            <h2>Agenda da Luta</h2>
            <div class="cal-container">
                <div id="calendar-days" class="cal-grid"></div>
                <div id="event-detail"></div>
            </div>
            <h2>Biblioteca Digital</h2>
            <div class="lib-box">
                <input type="text" class="search-input" id="lib-search" placeholder="Pesquisar..." onkeyup="filtrarLib()">
                <div id="lib-list"></div>
            </div>
        </div>
    </div>

    <footer>
        Tecnologia <a href="https://www.dree.one/" target="_blank">Dree.One</a>
    </footer>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };
    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let dadosMateriais = [];
    let eventosCarregados = [];

    async function validarAcesso() {
        const n = document.getElementById('user-name').value.trim();
        const e = document.getElementById('user-email').value.trim();
        const { data } = await _supabase.from('unegro_filiados').select('*').ilike('nome', n).ilike('email', e).limit(1);
        if (data?.length > 0) {
            document.getElementById('user-info').innerText = `${data[0].nome.toUpperCase()} | ${data[0].cidade.toUpperCase()}`;
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'grid';
            carregarDadosPortal();
        } else { alert("Cadastro não localizado."); }
    }

    async function carregarDadosPortal() {
        const { data: news } = await _supabase.from('unegro_noticias').select('*').order('created_at', { ascending: false }).limit(1);
        if(news?.length > 0) {
            document.getElementById('destaque-area').innerHTML = `<div class="news-card"><img src="${news[0].imagem_url}" class="news-img"><div class="news-body"><span class="news-tag">Destaque Atual</span><h3>${news[0].titulo}</h3><p>${news[0].descricao}</p>${news[0].link_externo ? `<a href="${news[0].link_externo}" target="_blank" style="color:var(--gold); font-weight:bold; text-decoration:none; font-size:12px;">LER CONTEÚDO COMPLETO →</a>` : ''}</div></div>`;
        }

        const { data: vids } = await _supabase.from('unegro_videos').select('*');
        if(vids) {
            const createCard = (v) => `<div class="video-item" onclick="abrirModal('https://www.youtube.com/embed/${v.youtube_id}', '${v.titulo}', true)"><img src="https://img.youtube.com/vi/${v.youtube_id}/0.jpg"><div class="video-label">${v.titulo.toUpperCase()}</div></div>`;
            document.getElementById('grid-liderancas').innerHTML = vids.filter(v => v.secao === 'liderancas').map(createCard).join('');
            document.getElementById('grid-nacional').innerHTML = vids.filter(v => v.secao === 'nacional').map(createCard).join('');
        }

        const { data: ag } = await _supabase.from('agenda_unegro').select('*');
        eventosCarregados = ag || [];
        renderCalendario(eventosCarregados);

        const { data: mt } = await _supabase.from('materiais_unegro').select('*').order('titulo');
        dadosMateriais = mt || [];
        renderLib(dadosMateriais);
    }

    function renderCalendario(eventos) {
        const grid = document.getElementById('calendar-days');
        const diasSemana = ['D','S','T','Q','Q','S','S'];
        let html = diasSemana.map(d => `<div style="font-size:10px; color:#444; font-weight:800; padding-bottom:10px;">${d}</div>`).join('');
        for(let i=1; i<=30; i++) {
            const dataStr = `2026-04-${i.toString().padStart(2, '0')}`;
            const temEvento = eventos.some(e => e.data === dataStr);
            html += `<div class="cal-day ${temEvento ? 'has-event' : ''}" onclick="cliqueDia('${dataStr}', this)">${i}</div>`;
        }
        grid.innerHTML = html;
    }

    function cliqueDia(dataStr, el) {
        document.querySelectorAll('.cal-day').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        const ev = eventosCarregados.find(e => e.data === dataStr);
        const detail = document.getElementById('event-detail');
        if(ev) {
            const dLink = ev.data.replace(/-/g, '');
            const gCal = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.titulo)}&dates=${dLink}/${dLink}&details=${encodeURIComponent(ev.descricao || '')}&location=${encodeURIComponent(ev.local || '')}`;
            detail.style.display = 'block';
            detail.innerHTML = `<b style="color:var(--gold); text-transform:uppercase;">${ev.titulo}</b><p style="margin:5px 0; font-size:12px;">📍 ${ev.local || 'A definir'}</p><p style="margin-bottom:15px; font-size:12px; color:#aaa;">${ev.descricao || ''}</p><div style="display:flex; gap:8px;"><a href="${gCal}" target="_blank" class="btn-sync" style="background:#4285F4; color:white;">+ GOOGLE</a><button onclick="baixarICS('${ev.titulo}', '${ev.data}', '${ev.local || ''}', '${ev.descricao || ''}')" class="btn-sync" style="background:#fff; color:#000; border:none; cursor:pointer;">+ ICLOUD</button></div>`;
        } else { detail.style.display = 'none'; }
    }

    function baixarICS(titulo, data, local, desc) {
        const d = data.replace(/-/g, '');
        const ics = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',`SUMMARY:${titulo}`,`DTSTART:${d}T090000Z`,`DTEND:${d}T100000Z`,`LOCATION:${local}`,`DESCRIPTION:${desc}`,'END:VEVENT','END:VCALENDAR'].join('\n');
        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.setAttribute('download', `evento.ics`);
        link.click();
    }

    function renderLib(lista) {
        document.getElementById('lib-list').innerHTML = lista.map(i => `<div class="lib-item" onclick="abrirModal('${i.link}', '${i.titulo}', false)">📄 ${i.titulo}</div>`).join('');
    }

    function filtrarLib() {
        const t = document.getElementById('lib-search').value.toLowerCase();
        renderLib(dadosMateriais.filter(m => m.titulo.toLowerCase().includes(t)));
    }

    function abrirModal(url, titulo, isVid) {
        const v = document.getElementById('pdf-viewer');
        v.src = isVid ? `${url}?autoplay=1` : `${url}#toolbar=0`;
        document.getElementById('modal-title').innerText = titulo;
        document.getElementById('pdf-modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function fecharModal() {
        document.getElementById('pdf-modal').style.display = 'none';
        document.getElementById('pdf-viewer').src = '';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
