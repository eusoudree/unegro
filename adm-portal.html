<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Estratégica | UNEGRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;850&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #050505; --gray: #121212; --border: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--black); color: #fff; }

        /* TELA DE LOGIN ADM */
        #login-adm { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--gray); padding: 50px; border-radius: 16px; border: 1px solid var(--gold); text-align: center; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* LAYOUT PAINEL */
        #painel-gestao { display: none; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-weight: 850; text-transform: uppercase; letter-spacing: -1px; font-size: 1.5rem; margin: 0; }

        .grid-forms { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 50px; }
        .form-card { background: var(--gray); border: 1px solid var(--border); border-radius: 16px; padding: 30px; }
        .form-card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin: 0 0 25px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }

        label { font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; margin-bottom: 5px; display: block; }
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid #333; color: #fff; 
            padding: 12px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; font-family: 'Inter';
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }

        .btn-post { 
            width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; 
            border-radius: 8px; font-weight: 850; text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-post:hover { background: #fff; transform: translateY(-2px); }

        /* TABELA DE GERENCIAMENTO */
        .manage-section { background: var(--gray); border-radius: 16px; border: 1px solid var(--border); padding: 30px; margin-top: 40px; margin-bottom: 100px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; font-size: 10px; text-transform: uppercase; color: var(--gold); padding: 10px; border-bottom: 2px solid #222; }
        td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #222; }
        .btn-del { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }
        
        @media (max-width: 800px) { .grid-forms { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="login-adm">
        <div class="login-card">
            <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" style="height: 50px; margin-bottom: 30px;">
            <h2 style="font-size: 14px; margin-bottom: 20px; letter-spacing: 2px;">GESTÃO ESTRATÉGICA</h2>
            <input type="text" id="adm-user" placeholder="Usuário">
            <input type="password" id="adm-pass" placeholder="Senha">
            <button class="btn-post" onclick="checkAdm()">ACESSAR PAINEL</button>
            <p id="error-adm" style="color: red; font-size: 11px; margin-top: 15px; display: none; font-weight: bold;">Acesso Negado.</p>
        </div>
    </div>

    <div id="painel-gestao">
        <header>
            <h1>Governança do Portal</h1>
            <button onclick="location.reload()" style="background: transparent; color: #666; border: none; cursor: pointer; font-size: 11px; font-weight: bold;">DESCONECTAR</button>
        </header>

        <div class="grid-forms">
            <div class="form-card">
                <h2>📢 Novo Destaque (Notícia)</h2>
                <label>Título do Destaque</label>
                <input type="text" id="news-titulo" placeholder="Título impactante">
                <label>Descrição Curta</label>
                <textarea id="news-desc" rows="3" placeholder="Resumo para o portal..."></textarea>
                <label>URL da Imagem</label>
                <input type="text" id="news-img" placeholder="Link da foto no Storage">
                <label>Link (Opcional)</label>
                <input type="text" id="news-link" placeholder="Link de destino">
                <button class="btn-post" onclick="salvarDestaque()">Publicar Destaque</button>
            </div>

            <div class="form-card">
                <h2>🎥 Conteúdo Audiovisual</h2>
                <label>Título ou Nome do Líder</label>
                <input type="text" id="vid-titulo" placeholder="Ex: Adriano S. - Depoimento">
                <label>ID do YouTube</label>
                <input type="text" id="vid-id" placeholder="Ex: dQw4w9WgXcQ">
                <label>Seção</label>
                <select id="vid-secao">
                    <option value="liderancas">Nossas Lideranças</option>
                    <option value="nacional">UNEGRO Nacional</option>
                </select>
                <button class="btn-post" onclick="salvarVideo()" style="background: #fff; color: #000;">Cadastrar Vídeo</button>
            </div>
        </div>

        <div class="manage-section">
            <h2 style="font-size: 1rem; color: var(--gold);">📁 GERENCIAR CONTEÚDO</h2>
            
            <div style="margin-top: 30px;">
                <h3 style="font-size: 12px; color: #666;">DESTAQUES ATIVOS</h3>
                <table id="table-news">
                    <thead><tr><th>Título</th><th style="width: 100px;">Ações</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div style="margin-top: 40px;">
                <h3 style="font-size: 12px; color: #666;">VÍDEOS CADASTRADOS</h3>
                <table id="table-vids">
                    <thead><tr><th>Título</th><th>Seção</th><th style="width: 100px;">Ações</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };
    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);

    // LOGIN
    function checkAdm() {
        const u = document.getElementById('adm-user').value.trim();
        const p = document.getElementById('adm-pass').value.trim();
        
        if(u === 'unegro' && p === 'Unegrovale2026!') {
            document.getElementById('login-adm').style.display = 'none';
            document.getElementById('painel-gestao').style.display = 'block';
            carregarDadosGerenciamento();
        } else {
            document.getElementById('error-adm').style.display = 'block';
        }
    }

    // CARREGAR LISTAS
    async function carregarDadosGerenciamento() {
        const { data: news } = await _supabase.from('unegro_noticias').select('*').order('created_at', { ascending: false });
        const { data: vids } = await _supabase.from('unegro_videos').select('*').order('secao');

        const tbodyNews = document.querySelector('#table-news tbody');
        tbodyNews.innerHTML = (news || []).map(n => `
            <tr>
                <td>${n.titulo}</td>
                <td><button class="btn-del" onclick="deletarItem('unegro_noticias', '${n.id}')">Excluir</button></td>
            </tr>
        `).join('');

        const tbodyVids = document.querySelector('#table-vids tbody');
        tbodyVids.innerHTML = (vids || []).map(v => `
            <tr>
                <td>${v.titulo}</td>
                <td style="text-transform:uppercase; font-size:10px; color:#666">${v.secao}</td>
                <td><button class="btn-del" onclick="deletarItem('unegro_videos', '${v.id}')">Excluir</button></td>
            </tr>
        `).join('');
    }

    // DELETAR
    async function deletarItem(tabela, id) {
        if(!confirm("Deseja apagar este conteúdo permanentemente?")) return;
        const { error } = await _supabase.from(tabela).delete().eq('id', id);
        if(error) alert("Erro: " + error.message);
        else carregarDadosGerenciamento();
    }

    // SALVAR NOTÍCIA
    async function salvarDestaque() {
        const payload = {
            titulo: document.getElementById('news-titulo').value,
            descricao: document.getElementById('news-desc').value,
            imagem_url: document.getElementById('news-img').value,
            link_externo: document.getElementById('news-link').value
        };
        const { error } = await _supabase.from('unegro_noticias').insert([payload]);
        if(error) alert("Erro ao salvar.");
        else { alert("Destaque publicado!"); carregarDadosGerenciamento(); limparCampos('news'); }
    }

    // SALVAR VÍDEO
    async function salvarVideo() {
        const payload = {
            titulo: document.getElementById('vid-titulo').value,
            youtube_id: document.getElementById('vid-id').value,
            secao: document.getElementById('vid-secao').value
        };
        const { error } = await _supabase.from('unegro_videos').insert([payload]);
        if(error) alert("Erro ao cadastrar.");
        else { alert("Vídeo adicionado!"); carregarDadosGerenciamento(); limparCampos('vid'); }
    }

    function limparCampos(tipo) {
        if(tipo === 'news') {
            document.getElementById('news-titulo').value = '';
            document.getElementById('news-desc').value = '';
            document.getElementById('news-img').value = '';
            document.getElementById('news-link').value = '';
        } else {
            document.getElementById('vid-titulo').value = '';
            document.getElementById('vid-id').value = '';
        }
    }
</script>
</body>
</html>
