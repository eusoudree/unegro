<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Lideranças | UNEGRO Vale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #0a0a0a; --gray: #151515; --blue: #1e3a5f; }
        body { background: var(--black); color: #eee; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: none; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-weight: 900; }
        
        .card { background: var(--gray); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
        
        /* Busca e Inputs */
        .search-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input, textarea, select { 
            width: 100%; background: #000; border: 1px solid #333; color: #fff; 
            padding: 12px; border-radius: 8px; outline: none; font-size: 14px; box-sizing: border-box;
        }
        input:focus, textarea:focus { border-color: var(--gold); }
        input[readonly] { background: #111; color: #888; cursor: not-allowed; }

        .results-box { background: #050505; border-radius: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #222; margin-bottom: 15px; }
        .res-item { padding: 12px; border-bottom: 1px solid #111; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
        .res-item:hover { background: #1a1a1a; color: var(--gold); }

        /* Grid do Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; display: none; padding-top: 20px; border-top: 1px solid #333; }
        .full { grid-column: span 2; }

        .btn { 
            background: var(--gold); color: #000; border: none; padding: 14px 25px; 
            border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; 
            transition: 0.3s; width: 100%;
        }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        .btn-edit { background: var(--blue); color: #fff; padding: 6px 12px; font-size: 10px; margin-right: 5px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-red { background: var(--red); color: #fff; padding: 6px 12px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { text-align: left; color: #444; text-transform: uppercase; padding: 12px; border-bottom: 2px solid #333; font-size: 10px; }
        td { padding: 15px 12px; border-bottom: 1px solid #222; }
        .img-preview { width: 45px; height: 45px; border-radius: 6px; background-size: cover; background-position: center; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Gestão de Lideranças</h2>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer; font-size:10px; font-weight:bold;">SAIR</button>
            <a href="adm.html" style="color:var(--gold); text-decoration:none; font-size:12px; font-weight:bold;">← VOLTAR</a>
        </div>
    </div>

    <div class="card">
        <span class="label" id="form-title">Cadastrar Nova Liderança</span>
        
        <div id="search-area">
            <div class="search-row">
                <input type="text" id="input-busca" placeholder="Busque um filiado pelo nome...">
                <button class="btn" style="width: auto;" onclick="buscarFiliados()">BUSCAR</button>
            </div>
            <div id="lista-busca" class="results-box"></div>
            
            <div style="text-align: center; margin-top: 10px;">
                <span style="font-size: 11px; color: #555;">OU</span><br>
                <button class="btn btn-outline" style="width: auto; margin-top: 10px; padding: 8px 15px; font-size: 11px;" onclick="abrirCadastroManual()">+ Cadastrar Liderança Manualmente</button>
            </div>
        </div>

        <form id="form-lider" class="form-grid">
            <input type="hidden" id="f-id"> 
            <div class="full">
                <span class="label">Nome da Liderança</span>
                <input type="text" id="f-nome" required>
            </div>
            <div>
                <span class="label">Cidade Origem</span>
                <input type="text" id="f-cidade" required>
            </div>
            <div>
                <span class="label">Hierarquia</span>
                <select id="f-tipo">
                    <option value="VALE">Liderança de Cidade</option>
                    <option value="COORDENACAO">Coordenação Geral</option>
                </select>
            </div>
            <div class="full"><span class="label">Cargo / Função</span><input type="text" id="f-cargo" placeholder="Ex: Articulação Política"></div>
            <div class="full"><span class="label">URL da Foto</span><input type="text" id="f-foto" placeholder="Link da imagem hospedada"></div>
            <div class="full"><span class="label">Biografia de Pertencimento</span><textarea id="f-bio" rows="4" placeholder="Conte a história dessa liderança..."></textarea></div>
            <div class="full"><span class="label">Instagram Link</span><input type="text" id="f-insta" placeholder="https://instagram.com/perfil"></div>
            
            <button type="button" class="btn" id="btn-salvar" onclick="salvarLider()">Salvar Liderança</button>
            <button type="button" class="btn" id="btn-cancelar" onclick="resetarForm()" style="display:none; background:#333; margin-top:10px;">Cancelar</button>
        </form>
    </div>

    <div class="card">
        <span class="label">Lideranças no Mosaico do Vale</span>
        <table>
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nome / Cargo</th>
                    <th>Cidade</th>
                    <th style="text-align:right;">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-liderancas"></tbody>
        </table>
    </div>
</div>

<script>
    // --- SEGURANÇA ---
    const PASS_KEY = "unegro_auth_lider";
    if (sessionStorage.getItem(PASS_KEY) !== "true") {
        const user = prompt("Usuário:");
        const pass = prompt("Senha:");
        if (user === "unegro" && pass === "Unegrovale2026!") {
            sessionStorage.setItem(PASS_KEY, "true");
            document.body.style.display = "block";
        } else {
            alert("Acesso negado.");
            window.location.href = "index.html";
        }
    } else {
        document.body.style.display = "block";
    }

    function logout() {
        sessionStorage.removeItem(PASS_KEY);
        location.reload();
    }

    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };
    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);

    // BUSCA FILIADOS
    async function buscarFiliados() {
        const termo = document.getElementById('input-busca').value;
        if(!termo) return;
        const { data, error } = await _supabase.from('unegro_filiados').select('nome, cidade').ilike('nome', `%${termo}%`).limit(5);
        if(error) return;
        document.getElementById('lista-busca').innerHTML = data.map(f => `
            <div class="res-item" onclick='selecionarFiliado(${JSON.stringify(f)})'>
                ${f.nome} <span style="color:#555;">| ${f.cidade}</span>
            </div>
        `).join('');
    }

    function selecionarFiliado(f) {
        resetarForm();
        document.getElementById('f-nome').value = f.nome;
        document.getElementById('f-nome').readOnly = true;
        document.getElementById('f-cidade').value = f.cidade;
        document.getElementById('f-cidade').readOnly = true;
        document.getElementById('form-lider').style.display = 'grid';
        document.getElementById('lista-busca').innerHTML = '';
        document.getElementById('btn-cancelar').style.display = 'block';
    }

    function abrirCadastroManual() {
        resetarForm();
        document.getElementById('f-nome').readOnly = false;
        document.getElementById('f-cidade').readOnly = false;
        document.getElementById('form-lider').style.display = 'grid';
        document.getElementById('btn-cancelar').style.display = 'block';
        window.scrollTo({ top: 200, behavior: 'smooth' });
    }

    // SALVAR (INSERIR OU ATUALIZAR)
    async function salvarLider() {
        const id = document.getElementById('f-id').value;
        const payload = {
            nome: document.getElementById('f-nome').value,
            cidade: document.getElementById('f-cidade').value,
            tipo: document.getElementById('f-tipo').value,
            cargo: document.getElementById('f-cargo').value,
            foto_url: document.getElementById('f-foto').value,
            biografia: document.getElementById('f-bio').value,
            instagram_url: document.getElementById('f-insta').value,
            ordem: document.getElementById('f-tipo').value === 'COORDENACAO' ? 1 : 100
        };

        if(!payload.nome || !payload.cidade) {
            alert("Nome e Cidade são obrigatórios.");
            return;
        }

        let result;
        if (id) {
            result = await _supabase.from('liderancas_unegro').update(payload).eq('id', id);
        } else {
            result = await _supabase.from('liderancas_unegro').insert([payload]);
        }

        if (result.error) alert("Erro ao salvar: " + result.error.message);
        else location.reload();
    }

    // LISTAR NA TABELA
    async function carregarTabela() {
        const { data } = await _supabase.from('liderancas_unegro').select('*').order('ordem', { ascending: true });
        const tbody = document.getElementById('tabela-liderancas');
        if(!data) return;
        tbody.innerHTML = data.map(l => `
            <tr>
                <td><div class="img-preview" style="background-image:url('${l.foto_url || 'https://via.placeholder.com/150'}')"></div></td>
                <td><strong>${l.nome}</strong><br><span style="color:#555; font-size:11px;">${l.cargo || 'Membro'}</span></td>
                <td>${l.cidade}</td>
                <td style="text-align:right;">
                    <button class="btn-edit" onclick='prepararEdicao(${JSON.stringify(l)})'>Editar</button>
                    <button class="btn-red" onclick="excluirLider(${l.id})">Remover</button>
                </td>
            </tr>
        `).join('');
    }

    // PREPARAR FORM PARA EDIÇÃO
    window.prepararEdicao = (lider) => {
        document.getElementById('form-title').innerText = "Editando: " + lider.nome;
        document.getElementById('search-area').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'block';
        document.getElementById('form-lider').style.display = 'grid';
        
        document.getElementById('f-id').value = lider.id;
        document.getElementById('f-nome').value = lider.nome;
        document.getElementById('f-nome').readOnly = false;
        document.getElementById('f-cidade').value = lider.cidade;
        document.getElementById('f-cidade').readOnly = false;
        document.getElementById('f-tipo').value = lider.tipo;
        document.getElementById('f-cargo').value = lider.cargo;
        document.getElementById('f-foto').value = lider.foto_url;
        document.getElementById('f-bio').value = lider.biografia || lider.mini_descricao || "";
        document.getElementById('f-insta').value = lider.instagram_url;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    function resetarForm() {
        document.getElementById('form-lider').reset();
        document.getElementById('f-id').value = "";
        document.getElementById('f-nome').readOnly = false;
        document.getElementById('f-cidade').readOnly = false;
        document.getElementById('form-title').innerText = "Cadastrar Nova Liderança";
        document.getElementById('search-area').style.display = 'block';
        document.getElementById('form-lider').style.display = 'none';
        document.getElementById('btn-cancelar').style.display = 'none';
    }

    async function excluirLider(id) {
        if(!confirm("Remover liderança do mosaico?")) return;
        await _supabase.from('liderancas_unegro').delete().eq('id', id);
        carregarTabela();
    }

    window.onload = carregarTabela;
</script>

</body>
</html>
