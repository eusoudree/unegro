<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Filiado | UNEGRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #0a0a0a; --gray: #1a1a1a; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--black); color: white; }

        /* Login Screen */
        #lock-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-card { background: var(--gray); padding: 40px; border-radius: 16px; border: 1px solid var(--gold); text-align: center; width: 100%; max-width: 360px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }

        /* Layout Estrutural */
        #main-content { display: none; height: 100vh; grid-template-columns: 250px 1fr; }
        
        /* Sidebar Navigation */
        nav { background: var(--gray); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .nav-logo { width: 120px; margin: 0 auto 30px; display: block; }
        .nav-btn { background: transparent; border: none; color: #888; padding: 15px; text-align: left; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-btn:hover, .nav-btn.active { background: var(--glass); color: var(--gold); }

        /* Main View */
        main { overflow-y: auto; padding: 40px; position: relative; }
        .welcome-header { margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .welcome-header h2 { color: var(--gold); margin: 0; text-transform: uppercase; font-size: 1.2rem; }
        .welcome-header span { color: #666; font-size: 0.9rem; }

        /* Sections */
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Cards Style */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .item-card { background: var(--gray); padding: 20px; border-radius: 12px; border: 1px solid #333; position: relative; }
        .item-card h3 { margin: 0 0 10px; color: var(--gold); font-size: 1.1rem; }
        .item-card p { font-size: 0.9rem; color: #bbb; }
        .btn-link { display: inline-block; margin-top: 15px; color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 4px; }

        /* Recados (Chat Adaptado) */
        #chat-display { height: 400px; overflow-y: auto; background: #121212; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .msg-box { background: var(--glass); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; }

        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 14px; font-weight: 700; background: var(--gold); color: var(--black); text-transform: uppercase; }
        
        @media (max-width: 768px) {
            #main-content { grid-template-columns: 1fr; }
            nav { display: none; } /* Ideal criar um menu mobile depois */
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-card">
            <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" style="height: 60px; margin-bottom: 20px;">
            <h2>Portal do Filiado</h2>
            <input type="text" id="user-name" placeholder="Seu nome oficial">
            <input type="email" id="user-email" placeholder="E-mail de cadastro">
            <button class="btn" style="width: 100%" onclick="validarAcesso()">Acessar Território</button>
            <p id="error-msg" style="color: #ff4d4d; font-size: 12px; margin-top: 20px; display: none;">Cadastro não localizado.</p>
        </div>
    </div>

    <div id="main-content">
        <nav>
            <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" class="nav-logo">
            <button class="nav-btn active" onclick="switchTab('inicio')">Dashboard</button>
            <button class="nav-btn" onclick="switchTab('agenda')">Agenda de Luta</button>
            <button class="nav-btn" onclick="switchTab('materiais')">Materiais de Apoio</button>
            <button class="nav-btn" onclick="switchTab('recados')">Mural de Recados</button>
        </nav>

        <main>
            <div class="welcome-header">
                <h2 id="welcome-text">Bem-vindo à luta, Filiado</h2>
                <span id="welcome-city">Território Vale do Paraíba</span>
            </div>

            <section id="inicio" class="content-section active">
                <h3>Conteúdos Exclusivos</h3>
                <div id="video-wrapper" style="width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--gold);">
                    </div>
            </section>

            <section id="agenda" class="content-section">
                <h3>Próximas Ações</h3>
                <div class="card-grid" id="agenda-list">
                    <p>Carregando agenda...</p>
                </div>
            </section>

            <section id="materiais" class="content-section">
                <h3>Biblioteca de Apoio</h3>
                <div class="card-grid" id="materiais-list">
                    <p>Carregando materiais...</p>
                </div>
            </section>

            <section id="recados" class="content-section">
                <h3>Mural da Comunidade</h3>
                <div id="chat-display"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Deixe um recado para a militância...">
                    <button class="btn" onclick="enviarMensagem()">Enviar</button>
                </div>
            </section>
        </main>
    </div>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };

    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let dadosUser = { nome: null, cidade: null };

    async function validarAcesso() {
        const n = document.getElementById('user-name').value.trim();
        const e = document.getElementById('user-email').value.trim();

        const { data } = await _supabase.from('unegro_filiados').select('nome, cidade').ilike('nome', n).ilike('email', e).limit(1);

        if (data && data.length > 0) {
            dadosUser.nome = data[0].nome;
            dadosUser.cidade = data[0].cidade;
            
            document.getElementById('welcome-text').innerText = `Bem-vindo à luta, ${dadosUser.nome.split(' ')[0]}!`;
            document.getElementById('welcome-city').innerText = `Território: ${dadosUser.cidade || 'Vale do Paraíba'}`;
            
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'grid';
            
            carregarAgenda();
            carregarMateriais();
            iniciarRecados();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function carregarAgenda() {
        const { data } = await _supabase.from('agenda_unegro').select('*').order('data', { ascending: true });
        const list = document.getElementById('agenda-list');
        if (data) {
            list.innerHTML = data.map(i => `
                <div class="item-card">
                    <span>${new Date(i.data).toLocaleDateString('pt-BR')}</span>
                    <h3>${i.titulo}</h3>
                    <p>${i.descricao}</p>
                </div>
            `).join('');
        }
    }

    async function carregarMateriais() {
        const { data } = await _supabase.from('materiais_unegro').select('*').order('titulo');
        const list = document.getElementById('materiais-list');
        if (data) {
            list.innerHTML = data.map(i => `
                <div class="item-card">
                    <h3>${i.titulo}</h3>
                    <a href="${i.link}" target="_blank" class="btn-link">ACESSAR MATERIAL</a>
                </div>
            `).join('');
        }
    }

    // Lógica de Recados (Baseada no seu chat anterior)
    async function iniciarRecados() {
        const { data: msgs } = await _supabase.from('live_chat').select('*').order('created_at', { ascending: false }).limit(20);
        if (msgs) msgs.reverse().forEach(renderMsg);
        _supabase.channel('mural').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'live_chat' }, p => renderMsg(p.new)).subscribe();
    }

    function renderMsg(m) {
        const d = document.createElement('div');
        d.className = 'msg-box';
        d.innerHTML = `<strong>${m.user_name} (${m.cidade})</strong><br>${m.content}`;
        const container = document.getElementById('chat-display');
        container.appendChild(d);
        container.scrollTop = container.scrollHeight;
    }

    async function enviarMensagem() {
        const i = document.getElementById('chat-input');
        if (!i.value.trim()) return;
        await _supabase.from('live_chat').insert([{ user_name: dadosUser.nome, cidade: dadosUser.cidade, content: i.value }]);
        i.value = '';
    }
</script>
</body>
</html>
