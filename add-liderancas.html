<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Lideranças | UNEGRO Vale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #0a0a0a; --gray: #1a1a1a; --blue: #1e3a5f; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: white; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        /* Login */
        #login-admin { background: var(--gray); padding: 40px; border-radius: 12px; border: 1px solid var(--gold); width: 350px; text-align: center; }
        
        /* Painel (Inicia Escondido) */
        #panel-admin { display: none; width: 1000px; max-width: 95%; margin: 20px auto; align-self: flex-start; }

        h2 { color: var(--gold); text-transform: uppercase; margin-top: 0; font-size: 1.2rem; letter-spacing: 1px; font-weight: 900; }
        
        .card { background: var(--gray); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 30px; }
        .label { font-size: 10px; color: #666; text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; text-align: left; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-size: 14px;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        input[readonly] { color: #555; cursor: not-allowed; }

        .btn { cursor: pointer; border: none; border-radius: 8px; padding: 14px; font-weight: 800; transition: 0.3s; text-transform: uppercase; width: 100%; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: var(--black); }
        .btn-gold:hover { background: #fff; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 11px; padding: 8px; width: auto; }
        
        /* Grid do Form */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; display: none; padding-top: 20px; border-top: 1px solid #333; margin-top: 20px; }
        .full { grid-column: span 2; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { text-align: left; color: #444; text-transform: uppercase; padding: 12px; border-bottom: 2px solid #333; font-size: 10px; }
        td { padding: 15px 12px; border-bottom: 1px solid #222; }
        .img-preview { width: 45px; height: 45px; border-radius: 6px; background-size: cover; background-position: center; border: 1px solid #333; }
        
        .results-box { background: #000; border-radius: 8px; max-height: 150px; overflow-y: auto; border: 1px solid #222; margin-top: 5px; }
        .res-item { padding: 12px; border-bottom: 1px solid #111; cursor: pointer; font-size: 13px; text-align: left; }
        .res-item:hover { background: #1a1a1a; color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-admin">
        <h2>Gestão de Lideranças</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn btn-gold" onclick="handleLogin()">Acessar Painel</button>
        <p id="err" style="color: var(--red); font-size: 12px; margin-top: 15px; display: none;">Acesso negado.</p>
    </div>

    <div id="panel-admin">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Mosaico de Lideranças</h2>
            <a href="adm.html" style="color:var(--gold); text-decoration:none; font-size:12px; font-weight:bold;">← VOLTAR</a>
        </div>

        <div class="card">
            <span class="label" id="form-title">Cadastrar Nova Liderança</span>
            
            <div id="search-area">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="input-busca" placeholder="Busque um filiado pelo nome...">
                    <button class="btn btn-gold" style="width: auto; margin: 10px 0;" onclick="buscarFiliados()">BUSCAR</button>
                </div>
                <div id="lista-busca" class="results-box"></div>
                <div style="text-align: center; margin-top: 10px;">
                    <button class="btn btn-outline" onclick="abrirCadastroManual()">+ Adicionar Liderança Manualmente</button>
                </div>
            </div>

            <form id="form-lider" class="form-grid">
                <input type="hidden" id="f-id"> 
                <div class="full"><span class="label">Nome</span><input type="text" id="f-nome"></div>
                <div><span class="label">Cidade</span><input type="text" id="f-cidade"></div>
                <div>
                    <span class="label">Hierarquia</span>
                    <select id="f-tipo">
                        <option value="VALE">Liderança de Cidade</option>
                        <option value="COORDENACAO">Coordenação Geral</option>
                    </select>
                </div>
                <div class="full"><span class="label">Cargo / Função</span><input type="text" id="f-cargo" placeholder="Ex: Articulação Política"></div>
                <div class="full"><span class="label">URL da Foto</span><input type="text" id="f-foto" placeholder="Link da imagem hospedada"></div>
                <div class="full"><span class="label">Biografia de Pertencimento</span><textarea id="f-bio" rows="4"></textarea></div>
                <div class="full"><span class="label">Instagram Link</span><input type="text" id="f-insta" placeholder="https://instagram.com/perfil"></div>
                
                <button type="button" class="btn btn-gold" onclick="salvarLider()">Gravar Dados</button>
                <button type="button" class="btn" onclick="resetarForm()" style="background:#333; color: #fff;">Cancelar</button>
            </form>
        </div>

        <div class="card">
            <span class="label">Lideranças Ativas</span>
            <table>
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Nome / Cargo</th>
                        <th>Cidade</th>
                        <th style="text-align:right;">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-liderancas"></tbody>
            </table>
        </div>
    </div>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };
    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);

    function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if(u === 'unegro' && p === 'Unegrovale2026!') {
            document.getElementById('login-admin').style.display = 'none';
            document.getElementById('panel-admin').style.display = 'block';
            document.body.style.alignItems = 'flex-start';
            carregarTabela();
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }

    async function buscarFiliados() {
        const termo = document.getElementById('input-busca').value;
        const { data } = await _supabase.from('unegro_filiados').select('nome, cidade').ilike('nome', `%${termo}%`).limit(5);
        document.getElementById('lista-busca').innerHTML = data.map(f => `
            <div class="res-item" onclick='selecionarFiliado(${JSON.stringify(f)})'>
                ${f.nome} <span style="color:#555;">| ${f.cidade}</span>
            </div>
        `).join('');
    }

    function selecionarFiliado(f) {
        abrirCadastroManual();
        document.getElementById('f-nome').value = f.nome;
        document.getElementById('f-cidade').value = f.cidade;
        document.getElementById('lista-busca').innerHTML = '';
    }

    function abrirCadastroManual() {
        document.getElementById('form-lider').style.display = 'grid';
        document.getElementById('search-area').style.display = 'none';
    }

    function resetarForm() {
        document.getElementById('form-lider').reset();
        document.getElementById('f-id').value = "";
        document.getElementById('form-lider').style.display = 'none';
        document.getElementById('search-area').style.display = 'block';
        document.getElementById('form-title').innerText = "Cadastrar Nova Liderança";
    }

    async function salvarLider() {
        const id = document.getElementById('f-id').value;
        const payload = {
            nome: document.getElementById('f-nome').value,
            cidade: document.getElementById('f-cidade').value,
            tipo: document.getElementById('f-tipo').value,
            cargo: document.getElementById('f-cargo').value,
            foto_url: document.getElementById('f-foto').value,
            biografia: document.getElementById('f-bio').value,
            instagram_url: document.getElementById('f-insta').value,
            ordem: document.getElementById('f-tipo').value === 'COORDENACAO' ? 1 : 100
        };

        let res = id ? 
            await _supabase.from('liderancas_unegro').update(payload).eq('id', id) : 
            await _supabase.from('liderancas_unegro').insert([payload]);

        if (res.error) alert("Erro ao salvar.");
        else { alert("Sucesso!"); resetarForm(); carregarTabela(); }
    }

    async function carregarTabela() {
        const { data } = await _supabase.from('liderancas_unegro').select('*').order('ordem', { ascending: true });
        document.getElementById('tabela-liderancas').innerHTML = data.map(l => `
            <tr>
                <td><div class="img-preview" style="background-image:url('${l.foto_url}')"></div></td>
                <td><strong>${l.nome}</strong><br><span style="color:#555; font-size:11px;">${l.cargo}</span></td>
                <td>${l.cidade}</td>
                <td style="text-align:right;">
                    <button onclick='prepararEdicao(${JSON.stringify(l)})' style="background:var(--blue); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:10px;">EDITAR</button>
                    <button onclick="excluirLider(${l.id})" style="background:var(--red); color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:10px;">REMOVER</button>
                </td>
            </tr>
        `).join('');
    }

    function prepararEdicao(l) {
        abrirCadastroManual();
        document.getElementById('form-title').innerText = "Editando: " + l.nome;
        document.getElementById('f-id').value = l.id;
        document.getElementById('f-nome').value = l.nome;
        document.getElementById('f-cidade').value = l.cidade;
        document.getElementById('f-tipo').value = l.tipo;
        document.getElementById('f-cargo').value = l.cargo;
        document.getElementById('f-foto').value = l.foto_url;
        document.getElementById('f-bio').value = l.biografia || l.mini_descricao || "";
        document.getElementById('f-insta').value = l.instagram_url;
    }

    async function excluirLider(id) {
        if(confirm("Excluir liderança?")) {
            await _supabase.from('liderancas_unegro').delete().eq('id', id);
            carregarTabela();
        }
    }
</script>
</body>
</html>
