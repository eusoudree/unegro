<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live UNEGRO | Vale do Paraíba</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1b434; --red: #ff4d4d; --black: #0a0a0a; --gray: #1a1a1a; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--black); color: white; overflow: hidden; }

        /* Login */
        #lock-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-card { background: var(--gray); padding: 40px; border-radius: 16px; border: 1px solid var(--gold); text-align: center; width: 100%; max-width: 360px; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .login-card img { height: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(241, 180, 52, 0.3)); }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        
        /* Layout Principal */
        #main-content { display: none; height: 100vh; grid-template-columns: 1fr 400px; }
        .video-section { background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Chat Sidebar */
        .chat-section { background: var(--gray); display: flex; flex-direction: column; border-left: 1px solid #333; position: relative; }
        
        /* Header Criativo */
        .chat-header { 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: linear-gradient(to bottom, #222, var(--gray));
            border-bottom: 1px solid #333;
        }
        .header-brand { display: flex; align-items: center; }
        .header-brand img { 
            height: 45px !important; 
            width: auto !important; 
            display: block !important;
            filter: drop-shadow(0 0 5px rgba(241, 180, 52, 0.2));
        }
        .live-tag {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4d4d;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.5px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .live-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff4d4d;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        /* Área de Mensagens */
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #121212; }
        .msg-box { background: var(--glass); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); border-left: 4px solid var(--gold); }
        .msg-info { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .msg-user { font-weight: 800; color: var(--gold); font-size: 10px; text-transform: uppercase; }
        .msg-city { font-size: 9px; color: #666; font-style: italic; }
        .msg-text { font-size: 14px; color: #ddd; line-height: 1.5; }

        /* Controles */
        .chat-controls { padding: 20px; background: var(--gray); border-top: 1px solid #333; display: flex; gap: 10px; }
        #chat-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px 15px; border-radius: 8px; outline: none; }
        #chat-input:focus { border-color: var(--gold); }

        /* Footer com Link */
        .chat-footer { 
            padding: 15px; 
            background: #0a0a0a; 
            text-align: center;
            border-top: 1px solid #222;
        }
        .chat-footer a { 
            color: #888; 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .chat-footer a:hover { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .btn { cursor: pointer; border: none; border-radius: 6px; padding: 14px; font-weight: 700; background: var(--gold); color: var(--black); width: 100%; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #fff; transform: translateY(-2px); }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 900px) {
            #main-content { grid-template-columns: 1fr; grid-template-rows: 50% 50%; }
            .chat-section { border-left: none; border-top: 1px solid #333; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-card">
            <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" alt="Logo">
            <h2>Portal do Filiado</h2>
            <input type="text" id="user-name" placeholder="Seu nome oficial">
            <input type="email" id="user-email" placeholder="E-mail de cadastro">
            <button class="btn" id="btn-login" onclick="validarAcesso()">Entrar na Roda</button>
            <p id="error-msg" style="color: var(--red); font-size: 12px; margin-top: 20px; display: none;">Cadastro não localizado.</p>
        </div>
    </div>

    <div id="main-content">
        <div class="video-section" id="video-wrapper"></div>
        
        <div class="chat-section">
            <div class="chat-header">
                <div class="header-brand">
                    <img src="https://unegroes.org.br/wp-content/uploads/2024/12/UNEGRO-LOGO-e1734363397338.png" alt="UNEGRO">
                </div>
                <div class="live-tag">AO VIVO</div>
            </div>

            <div id="chat-display"></div>

            <div class="chat-controls">
                <input type="text" id="chat-input" placeholder="Participe...">
                <button class="btn" style="width: auto; margin: 0; padding: 10px 20px;" onclick="enviarMensagem()">➤</button>
            </div>

            <div class="chat-footer">
                <a href="https://unegro.online" target="_blank">WWW.UNEGRO.ONLINE</a>
            </div>
        </div>
    </div>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };

    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let dadosUser = { nome: null, cidade: null };

    async function validarAcesso() {
        const btn = document.getElementById('btn-login');
        const n = document.getElementById('user-name').value.trim();
        const e = document.getElementById('user-email').value.trim();

        if(!n || !e) return;
        btn.innerText = "VALIDANDO...";

        try {
            const { data } = await _supabase.from('unegro_filiados').select('nome, cidade').ilike('nome', n).ilike('email', e).limit(1);

            if (data && data.length > 0) {
                dadosUser.nome = data[0].nome;
                dadosUser.cidade = data[0].cidade || "Vale do Paraíba";
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
                iniciar();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        } catch (err) { alert("Erro de conexão."); }
        finally { btn.innerText = "ENTRAR NA RODA"; }
    }

    async function iniciar() {
        const { data: c } = await _supabase.from('configuracoes').select('valor').eq('chave', 'url_live_atual').maybeSingle();
        if (c) document.getElementById('video-wrapper').innerHTML = `<iframe src="${c.valor}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;

        const { data: msgs } = await _supabase.from('live_chat').select('*').order('created_at', { ascending: false }).limit(30);
        if (msgs) msgs.reverse().forEach(render);

        _supabase.channel('live').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'live_chat' }, p => render(p.new)).subscribe();
    }

    function render(m) {
        const d = document.createElement('div');
        d.className = 'msg-box';
        d.innerHTML = `<div class="msg-info"><span class="msg-user">${m.user_name}</span><span class="msg-city">${m.cidade || ''}</span></div><div class="msg-text">${m.content}</div>`;
        const container = document.getElementById('chat-display');
        container.appendChild(d);
        container.scrollTop = container.scrollHeight;
    }

    async function enviarMensagem() {
        const i = document.getElementById('chat-input');
        const t = i.value.trim();
        if (!t) return;
        i.value = '';
        await _supabase.from('live_chat').insert([{ user_name: dadosUser.nome, cidade: dadosUser.cidade, content: t }]);
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });
</script>
</body>
</html>
