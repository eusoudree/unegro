<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live UNEGRO | Vale do Paraíba</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #0a0a0a; --gray: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--black); color: white; overflow: hidden; }

        /* Login Screen */
        #lock-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-card { background: var(--gray); padding: 40px; border-radius: 12px; border: 1px solid var(--gold); text-align: center; width: 100%; max-width: 380px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .login-card h2 { color: var(--gold); margin-bottom: 25px; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 2px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; font-size: 15px; outline: none; }
        .login-card input:focus { border-color: var(--gold); }
        
        /* Layout */
        #main-content { display: none; height: 100vh; grid-template-columns: 1fr 400px; }
        
        .video-section { background: #000; display: flex; flex-direction: column; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .chat-section { background: var(--gray); display: flex; flex-direction: column; border-left: 1px solid #333; }
        .chat-header { padding: 20px; border-bottom: 1px solid #333; color: var(--gold); font-weight: bold; font-size: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .chat-header::before { content: ''; width: 10px; height: 10px; background: #00ff00; border-radius: 50%; box-shadow: 0 0 10px #00ff00; }
        
        #chat-display { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-box { background: #222; padding: 12px; border-radius: 8px; border-left: 3px solid var(--gold); }
        .msg-user { font-weight: 800; color: var(--gold); font-size: 10px; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .msg-text { font-size: 14px; color: #eee; line-height: 1.5; }

        .chat-controls { padding: 20px; background: #151515; border-top: 1px solid #333; display: flex; gap: 10px; }
        #chat-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 14px; border-radius: 6px; outline: none; }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 14px; font-weight: 700; transition: 0.2s; text-transform: uppercase; background: var(--gold); color: var(--black); width: 100%; margin-top: 10px; }
        .btn:hover { background: #e0a32a; transform: translateY(-1px); }

        @media (max-width: 900px) {
            #main-content { grid-template-columns: 1fr; grid-template-rows: 50% 50%; }
            .chat-section { border-left: none; border-top: 1px solid #333; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="login-card">
            <img src="https://unegro.org.br/wp-content/uploads/2021/04/logo-unegro.png" width="80" style="margin-bottom: 20px;">
            <h2>ACESSO EXCLUSIVO</h2>
            <input type="text" id="user-name" placeholder="Nome Completo" autocomplete="off">
            <input type="email" id="user-email" placeholder="E-mail Cadastrado" autocomplete="off">
            <button class="btn" id="btn-login" onclick="validarAcesso()">Acessar Agora</button>
            <p id="error-msg" style="color: var(--red); font-size: 12px; margin-top: 20px; display: none; font-weight: 800; background: rgba(139,0,0,0.1); padding: 10px; border-radius: 4px; border: 1px solid var(--red);">
                FILIADO NÃO LOCALIZADO.<br>Verifique a grafia exata do cadastro.
            </p>
        </div>
    </div>

    <div id="main-content">
        <div class="video-section" id="video-wrapper">
            <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#555;">Conectando ao sinal da transmissão...</div>
        </div>

        <div class="chat-section">
            <div class="chat-header">DIÁLOGO AO VIVO</div>
            <div id="chat-display"></div>
            <div class="chat-controls">
                <input type="text" id="chat-input" placeholder="Escreva algo...">
                <button class="btn" style="width: auto; margin: 0;" onclick="enviarMensagem()">➤</button>
            </div>
        </div>
    </div>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };

    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let usuarioLogado = null;

    async function validarAcesso() {
        const btn = document.getElementById('btn-login');
        const nomeIn = document.getElementById('user-name').value.trim();
        const emailIn = document.getElementById('user-email').value.trim();

        if(!nomeIn || !emailIn) return alert("Por favor, preencha todos os campos.");

        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;

        try {
            // Busca blindada: ILIKE para ignorar Case e % para ignorar espaços no banco
            const { data, error } = await _supabase
                .from('unegro_filiados')
                .select('nome')
                .ilike('nome', `%${nomeIn}%`)
                .ilike('email', `%${emailIn}%`)
                .maybeSingle();

            if (error) {
                console.error("Erro Supabase:", error);
                alert("Erro de conexão com o banco de dados. Verifique sua rede.");
                return;
            }

            if (data) {
                usuarioLogado = data.nome;
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'grid';
                iniciarAmbiente();
            } else {
                exibirErroAcesso();
            }
        } catch (err) {
            console.error(err);
        } finally {
            btn.innerText = "ACESSAR AGORA";
            btn.disabled = false;
        }
    }

    function exibirErroAcesso() {
        const msg = document.getElementById('error-msg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 6000);
    }

    async function iniciarAmbiente() {
        // Busca a URL da live que você salvou no ADM
        const { data } = await _supabase
            .from('configuracoes')
            .select('valor')
            .eq('chave', 'url_live_atual')
            .single();

        if (data && data.valor) {
            // Garante que o iframe ocupe tudo e seja responsivo
            document.getElementById('video-wrapper').innerHTML = 
                `<iframe src="${data.valor}" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>`;
        }
        conectarChatRealtime();
    }

    async function conectarChatRealtime() {
        // Carrega as últimas 40 mensagens enviadas
        const { data: msgs } = await _supabase
            .from('live_chat')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(40);
        
        if (msgs) msgs.reverse().forEach(renderizarMensagem);

        // Ativa o Realtime para novas mensagens
        _supabase
            .channel('canal_unegro_live')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'live_chat' }, payload => {
                renderizarMensagem(payload.new);
            })
            .subscribe();
    }

    function renderizarMensagem(m) {
        const div = document.createElement('div');
        div.className = 'msg-box';
        div.innerHTML = `<span class="msg-user">${m.user_name}</span><span class="msg-text">${m.content}</span>`;
        const container = document.getElementById('chat-display');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function enviarMensagem() {
        const input = document.getElementById('chat-input');
        const conteudo = input.value.trim();
        if (!conteudo) return;
        input.value = '';

        await _supabase.from('live_chat').insert([
            { user_name: usuarioLogado, content: conteudo }
        ]);
    }

    // Atalho Enter no input
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enviarMensagem();
    });
</script>
</body>
</html>
