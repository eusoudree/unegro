<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live UNEGRO | Espaço de Diálogo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1b434; --red: #8b0000; --black: #0a0a0a; --gray: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--black); color: white; overflow: hidden; }

        /* Login */
        #access-screen { position: fixed; inset: 0; background: var(--black); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .access-box { background: var(--gray); padding: 40px; border-radius: 12px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        .access-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 12px; font-weight: 700; transition: 0.2s; text-transform: uppercase; width: 100%; background: var(--gold); color: var(--black); }

        /* Layout */
        #live-container { display: none; height: 100vh; grid-template-columns: 1fr 380px; }
        
        .video-area { background: #000; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }

        .chat-sidebar { background: var(--gray); display: flex; flex-direction: column; border-left: 1px solid #333; }
        .chat-header { padding: 20px; border-bottom: 1px solid #333; color: var(--gold); font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { background: #252525; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.4; border-left: 3px solid var(--gold); }
        .msg-user { font-weight: bold; color: var(--gold); font-size: 11px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        .chat-input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; background: #151515; }
        #chat-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; outline: none; }
        #chat-input:focus { border-color: var(--gold); }

        @media (max-width: 900px) {
            #live-container { grid-template-columns: 1fr; grid-template-rows: 60% 40%; }
            .chat-sidebar { border-left: none; border-top: 1px solid #333; }
        }
    </style>
</head>
<body>

    <div id="access-screen">
        <div class="access-box">
            <h2 style="color: var(--gold); margin: 0 0 10px 0;">Identifique-se</h2>
            <p style="font-size: 13px; color: #888; margin-bottom: 20px;">Acesso restrito aos filiados da UNEGRO.</p>
            <input type="text" id="acc-name" placeholder="Nome Completo">
            <input type="email" id="acc-email" placeholder="E-mail Cadastrado">
            <button class="btn" onclick="validateAccess()">Entrar na Roda</button>
            <p id="msg-erro" style="color: var(--red); font-size: 12px; margin-top: 15px; display: none;">Dados não conferem com nossa base.</p>
        </div>
    </div>

    <div id="live-container">
        <div class="video-area" id="video-frame-container">
            </div>

        <div class="chat-sidebar">
            <div class="chat-header">CHAT AO VIVO</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escreva sua mensagem...">
                <button class="btn" style="width: 50px;" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

<script>
    const CONFIG = {
        URL: 'https://huxemmuzhlntwimgiukt.supabase.co',
        KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1eGVtbXV6aGxudHdpbWdpdWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NzAyMDYsImV4cCI6MjA5MDM0NjIwNn0.Y85R3XQ9w4vMUGiH9zNmwpFpEj6jRPHc7lSjyYN_VVs'
    };

    const _supabase = supabase.createClient(CONFIG.URL, CONFIG.KEY);
    let currentUser = null;

    async function validateAccess() {
        const name = document.getElementById('acc-name').value.trim();
        const email = document.getElementById('acc-email').value.trim();

        const { data, error } = await _supabase
            .from('unegro_filiados')
            .select('nome, email')
            .ilike('nome', name)
            .ilike('email', email)
            .maybeSingle();

        if (data) {
            currentUser = data;
            document.getElementById('access-screen').style.display = 'none';
            document.getElementById('live-container').style.display = 'grid';
            loadLiveAndChat();
        } else {
            const err = document.getElementById('msg-erro');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 3000);
        }
    }

    async function loadLiveAndChat() {
        // Busca a URL da live que você definiu na outra página/tabela
        const { data } = await _supabase
            .from('configuracoes')
            .select('valor')
            .eq('chave', 'url_live_atual')
            .single();

        if (data && data.valor) {
            document.getElementById('video-frame-container').innerHTML = 
                `<iframe src="${data.valor}" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`;
        }

        initChat();
    }

    async function initChat() {
        const { data: messages } = await _supabase
            .from('live_chat')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(30);
        
        if (messages) messages.reverse().forEach(appendMessage);

        _supabase
            .channel('chat_realtime')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'live_chat' }, payload => {
                appendMessage(payload.new);
            })
            .subscribe();
    }

    function appendMessage(msg) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<span class="msg-user">${msg.user_name}</span>${msg.content}`;
        const container = document.getElementById('chat-messages');
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;
        input.value = '';
        await _supabase.from('live_chat').insert([{ user_name: currentUser.nome, content: text }]);
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
